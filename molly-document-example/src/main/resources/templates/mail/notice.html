<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title th:text="${title}">系统通知</title>
</head>
<body style="font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif; color: #333;">
<div style="max-width: 640px; margin: 0 auto; padding: 24px;">
    <h2 th:text="${title}" style="color: #1f77b4;">系统通知</h2>
    <p>您好，<strong th:text="${name}">用户</strong>：</p>
    <p th:text="${message}">这里是一条占位消息。</p>

    <!-- 可选：操作链接 -->
    <p th:if="${actionUrl != null}">
        <a th:href="${actionUrl}"
           style="display:inline-block;padding:10px 20px;background:#1f77b4;color:#fff;text-decoration:none;border-radius:4px;"
           th:text="${actionText ?: '查看详情'}">查看详情</a>
    </p>

    <hr style="border:none;border-top:1px solid #eee;margin:24px 0;"/>
    <p style="color:#999;font-size:12px;">本邮件由 molly-document-spring-boot-starter 自动发出，请勿直接回复。</p>
</div>
</body>
</html>
