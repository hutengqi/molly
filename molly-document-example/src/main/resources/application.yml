server:
  port: 8081

spring:
  application:
    name: molly-document-example
  mail:
    host: smtp.example.com
    port: 465
    username: noreply@example.com
    password: change-me
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true
  thymeleaf:
    prefix: classpath:/templates/mail/
    suffix: .html
    mode: HTML
    encoding: UTF-8
    cache: false

molly:
  document:
    word:
      template-location: classpath:/templates/word/
      cache-templates: true
    excel:
      stream-window-size: 200
      header-preset: default
      header-separator: "."
    pdf:
      template-location: classpath:/templates/pdf/
      flatten: true
    email:
      from: noreply@example.com
      template-location: classpath:/templates/mail/
      async:
        enabled: true
        core-pool-size: 4
        max-pool-size: 16
        queue-capacity: 200
      retry:
        enabled: true
        max-attempts: 3
        back-off: 2s
